<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>World Map - Publications by Location</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>
  body { margin:0; background:white; font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans TC", sans-serif; }
  #map { width:100%; height:100vh; }

  /* 右側資訊面板 */
  #sidePanel {
    position: fixed;
    top: 0;
    right: 0;
    width: 380px;
    height: 100vh;
    background: rgba(255,255,255,0.97);
    border-left: 1px solid rgba(0,0,0,0.08);
    box-shadow: -12px 0 30px rgba(0,0,0,0.12);
    padding: 16px 16px;
    box-sizing: border-box;
    display: none;
    overflow: auto;
    z-index: 9999;
  }
  #sidePanel .topbar{
    display:flex;
    align-items:flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  #sidePanel .title {
    font-size: 16px;
    font-weight: 800;
    line-height: 1.2;
    margin: 0;
  }
  #sidePanel .subtitle{
    margin-top: 6px;
    font-size: 12px;
    color: rgba(17,17,17,0.65);
    line-height: 1.4;
  }
  #sidePanel .closeBtn {
    border: 1px solid rgba(0,0,0,0.12);
    background: white;
    border-radius: 10px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
    flex: 0 0 auto;
  }

  .divider {
    height: 1px;
    background: rgba(0,0,0,0.08);
    margin: 12px 0;
  }

  .pub {
    padding: 10px 10px;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 12px;
    margin-bottom: 10px;
    background: #fff;
  }
  .pub .pub-title{
    font-weight: 700;
    font-size: 13px;
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .pub .pub-meta{
    font-size: 12px;
    color: rgba(17,17,17,0.68);
    line-height: 1.4;
  }
  .tag {
    display:inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(0,0,0,0.06);
    color: rgba(17,17,17,0.7);
    margin-right: 6px;
  }
</style>
</head>

<body>
<div id="map"></div>

<!-- 右側面板 -->
<div id="sidePanel">
  <div class="topbar">
    <div>
      <div class="title" id="panelTitle">選擇一個點</div>
      <div class="subtitle" id="panelSubtitle">點擊地圖上的圓點後，這裡會顯示出版品清單。</div>
    </div>
    <button class="closeBtn" id="closePanel">關閉</button>
  </div>

  <div class="divider"></div>

  <div id="panelBody"></div>
</div>

<script>
/** =====================================================
 *  ✅ 你以後主要只需要改這段：DATA
 *  每個 location 代表一個城市/機構/國家據點
 *  - label: 顯示名稱（建議：城市或機構）
 *  - country: 國家（可選）
 *  - lat/lon: 座標
 *  - color: 點的顏色
 *  - count: 用來調整圓大小（可用 publications.length）
 *  - publications: 該點的出版品陣列
 *      - title / source / year （你提供的格式）
 *      - url 可選（未來可做成可點連結）
 *  ===================================================== */
var locations = [
  {
    id: "beijing",
    label: "Beijing",
    country: "China",
    lat: 39.90571,
    lon: 116.39130,
    color: "#F75000",
    publications: [
      { title: "We the People, Vol. 3: The Civil Rights Revolution", source: "Harvard University Press", year: 2014, translations: "Chinese: China University of Law and Political Science Press, 2019."},
      { title: "We the People, Vol 2: Transformations", source: "Harvard University Press", year: 1998, translations: "Chinese: Law Press China, 2004; new translation, China University of Law and Political Science Press, 2013."},
      { title: "The Future of Liberal Revolution", source: "Yale University Press", year: 1992, translations: "Chinese: China University of Law and Political Science Press, 2014."},
      { title: "We the People, Vol 1: Foundations", source: "Harvard University Press", year: 1991, translations: "Chinese: China Law Press, 2004; Chinese: new translation, China University of Law and Political Science Press, 2013."},
      { title: "Preface, We the People: Foundations", year: 2013, translations: "Chinese edition: The Collected Works of Bruce Ackerman, 2013."}
    ]
  },
  {
    id: "nanjing",
    label: "Nanjing",
    country: "China",
    lat: 32.04383,
    lon: 118.77886,
    color: "#F75000",
    publications: [
      { title: "Social Justice in the Liberal State", source: "Yale University Press", year: 1980, translations: "Chinese:Yilin Press, 2015."},
    ]
  },
  {
    id: "madrid",
    label: "Madrid",
    country: "Spain",
    lat: 40.41678,
    lon: -3.70351,
    color: "#F75000",
    publications: [
      { title: "Before the Next Attack", source: "Yale University Press", year: 2006, translations: "Spanish: 2007."},
      { title: "Social Justice in the Liberal State", source: "Yale University Press", year: 1980, translations: "Spanish: Centro de Estudios Constitutionales, 1993."},
    ]
  },
  {
    id: "barcelona",
    label: "Barcelona",
    country: "Spain",
    lat: 41.38258,
    lon: 2.17707,
    color: "#F75000",
    publications: [
      { title: "La Politica del Dialogo Liberal", source: "Gedisa", year: 1999},
      { title: "The Future of Liberal Revolution", source: "Yale University Press", year: 1992, translations: "Spanish: Ariel, 1995."},
    ]
  },
  {
    id: "kraków",
    label: "Kraków",
    country: "Poland",
    lat: 50.04694,
    lon: 19.99715,
    color: "#F75000",
    publications: [
      { title: "The Future of Liberal Revolution", source: "Yale University Press", year: 1992, translations: "Polish: Terminus, 1996."},
    ]
  },
  {
    id: "são paulo",
    label: "São Paulo",
    country: "Brazil",
    lat: -23.55065,
    lon: -46.63338,
    color: "#F75000",
    publications: [
      { title: "We the People, Vol 1: Foundations", source: "Harvard University Press", year: 1991, translations: "Portuguese: Del Rey, 2006."},
    ]
  },
  {
    id: "santiago",
    label: "Santiago",
    country: "Chile",
    lat: -33.43770,
    lon: -70.65107,
    color: "#F75000",
    publications: [
      { title: "Adios Montesquieu", source: "Revista del Centro de Estudios Constitutionales, Vol. 5, Num. 9. Pp. 3-14", year: 2019},
    ]
  },
  
  {
    id: "frankfurt",
    label: "Frankfurt",
    country: "Germany",
    lat: 50.11064,
    lon: 8.68209,
    color: "#F75000",
    publications: [
      { title: "The Stakeholder Society (with Anne Alstott)", source: "Yale University Press", year: 1999, translations: "German translation: Campus, 2001; developed further by Offe, Grozinger, & Maschke, Die Teilhabegesellschaft - Modell eines neuen Wohlfahrtsstaates (Campus, 2006)."},
    ]
  },
  {
    id: "munich",
    label: "Munich",
    country: "Germnay",
    lat: 48.13711,
    lon: 11.57538,
    color: "#F75000",
    publications: [
      { title: "The Future of Liberal Revolution", source: "Yale University Press", year: 1992, translations: "German: Ein neuer Anfang fuer Europa, Siedler: 1993."},
    ]
  },
  {
    id: "rome",
    label: "Rome",
    country: "Italy",
    lat: 41.89332,
    lon: 12.48293,
    color: "#F75000",
    publications: [
      { title: "Before the Next Attack", source: "Yale University Press", year: 2006, translations: "Italian: 2008."},
    ]
  },
  {
    id: "bologna",
    label: "Bologna",
    country: "Italy",
    lat: 44.49382,
    lon: 11.34263,
    color: "#F75000",
    publications: [
      { title: "Social Justice in the Liberal State", source: "Yale University Press", year: 1980, translations: "Italian: Il Mulino, 1984."},
    ]
  },
  {
    id: "paris",
    label: "Paris",
    country: "France",
    lat: 48.85350,
    lon: 2.34839,
    color: "#F75000",
    publications: [
      { title: "We the People, Vol 1: Foundations", source: "Harvard University Press", year: 1991, translations: "French: Au Nom du Peuple, Calmann-Levy, 1998."},
      { title: "Three Paths to Constitutionalism – and the Crisis of the European Union", source: "45 British Journal of Political Science 705", year: 2015, translations:"French translation (June 2018) : Le Grande Continent." },
    ]
  },
  {
    id: "tokyo",
    label: "Tokyo",
    country: "Japan",
    lat: 35.68,
    lon: 139.69,
    color: "#E76F51",
    publications: [
      { title: "Three Paths to Constitutionalism – and the Crisis of the European Union", source: "45 British Journal of Political Science 705", year: 2015, translations:"Japanese translation: Horitsu Jiho (April 2015)." },
      { title: "Example paper title B", source: "Journal Y", year: 2021},
      { title: "Preface, Deliberation Day (with James Fishkin)", source: "Japanese edition", year: 2015},
    ]
  },
  {
    id: "london",
    label: "London",
    country: "UK",
    lat: 51.50,
    lon: -0.12,
    color: "#2A9D8F",
    publications: [
      { title: "Is Britain ready for a constitutional convention? A rejoinder", source: "The Political Quarterly", year: 2018 },
      { title: "Why Britain Needs a Written Constitution—and Can't Wait for Parliament to Write One", source: "Political Quarterly", year: 2018 },
      { title: "Britain at the Constitutional Crossroads", source: "British Academy", year: 2016 }
    ]
  },
  {
    id: "taipei",
    label: "Taipei",
    country: "Taiwan",
    lat: 25.03,
    lon: 121.55,
    color: "#E63946",
    publications: [
      { title: "Example title in Taipei", source: "Conference Z", year: 2022 }
    ]
  }
];

/** =====================================================
 *  地圖初始化
 *  ===================================================== */
var map = L.map('map', {
  zoomControl: true,
  minZoom: 2,
  maxZoom: 6,
  maxBounds: [[-65, -200], [90, 200]],
  maxBoundsViscosity: 1.0
}).setView([20, 10], 3);

// 極簡無標籤底圖
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  noWrap: true,
  bounds: [[-90, -200], [90, 200]]
}).addTo(map);

// Cluster
var markers = L.markerClusterGroup({
  showCoverageOnHover: false,
  maxClusterRadius: 30
});
map.addLayer(markers);

// 右側面板 DOM
var sidePanel = document.getElementById("sidePanel");
var panelTitle = document.getElementById("panelTitle");
var panelSubtitle = document.getElementById("panelSubtitle");
var panelBody = document.getElementById("panelBody");
document.getElementById("closePanel").addEventListener("click", function(){
  sidePanel.style.display = "none";
});

// 依 count 調大小（你可自行調整）
function radiusFromCount(count){
  count = Number(count || 1);
  return 3 + count * 0.5; // 原本比例
}

// 生成右側面板 HTML
function renderPanel(p){
  var pubs = Array.isArray(p.publications) ? p.publications : [];
  var count = pubs.length;

  panelTitle.textContent = p.label + (p.country ? (" · " + p.country) : "");
  panelSubtitle.innerHTML =
    '<span class="tag">Count: ' + count + '</span>' +
    '<span class="tag">Lat: ' + Number(p.lat).toFixed(4) + '</span>' +
    '<span class="tag">Lon: ' + Number(p.lon).toFixed(4) + '</span>';

  if (count === 0) {
    panelBody.innerHTML = "<div style='color:rgba(17,17,17,0.7); font-size:13px;'>No publications.</div>";
    return;
  }

  // 依年份新到舊排序（可拿掉）
  pubs = pubs.slice().sort(function(a,b){
    return Number(b.year || 0) - Number(a.year || 0);
  });

  var html = "";
  pubs.forEach(function(pub){
    var title = pub.title || "(Untitled)";
    var source = pub.source || "";
    var year = pub.year != null ? pub.year : "";

  var transHtml = "";
if (pub.translations) {
  transHtml =
    '<div class="pub-meta" style="margin-top:6px;">' +
      '<b>Translations:</b> ' + escapeHtml(pub.translations) +
    '</div>';
}
    html +=
  '<div class="pub">' +
    '<div class="pub-title">' + escapeHtml(title) + '</div>' +
    '<div class="pub-meta">' + escapeHtml(source) +
      (year !== "" ? (" (" + escapeHtml(String(year)) + ")") : "") +
    '</div>' +
    transHtml +
  '</div>';
      
  });

  panelBody.innerHTML = html;
}

// 簡易防 XSS：面板用 innerHTML 前先 escape
function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/** =====================================================
 *  產生點位
 *  ===================================================== */
locations.forEach(function(p){
  var pubs = Array.isArray(p.publications) ? p.publications : [];
  var count = pubs.length;

  // 如果你想手動指定 count，也可以在資料中放 p.count，這裡優先使用它
  var finalCount = (p.count != null) ? p.count : count;

  var marker = L.circleMarker([p.lat, p.lon], {
    radius: radiusFromCount(finalCount),
    fillColor: p.color || "#333",
    fillOpacity: 0.8,
    stroke: false
  });

  // popup 簡短顯示
  marker.bindPopup(escapeHtml(p.label) + " (Count: " + finalCount + ")");

  // 點擊：開 popup + 更新右側面板
  marker.on("click", function(){
    this.openPopup();
    renderPanel(p);
    sidePanel.style.display = "block";
  });

  markers.addLayer(marker);
});
/** =====================================================
 *  Legend 自動生成（依據 color + country）
 *  ===================================================== */

// 收集「顏色 → 類別名稱」對應
var legendMap = {};

locations.forEach(function(p){
  var label = p.country || p.label || "Other";
  var color = p.color || "#333";

  // 避免重複
  if (!legendMap[color]) {
    legendMap[color] = label;
  }
});

// 建立 Leaflet 控制元件
var legend = L.control({ position: "bottomright" });

legend.onAdd = function () {
  var div = L.DomUtil.create("div");

  var html = `
    <div style="
      background:white;
      padding:12px 14px;
      border-radius:12px;
      box-shadow:0 6px 20px rgba(0,0,0,0.15);
      font-family:system-ui;
      font-size:13px;
      line-height:1.6;
    ">
      <div style="font-weight:700; margin-bottom:8px;">Legend</div>
  `;

  for (var color in legendMap) {
    html += `
      <div style="display:flex; align-items:center; margin-bottom:6px;">
        <span style="
          display:inline-block;
          width:12px;
          height:12px;
          background:${color};
          border-radius:50%;
          margin-right:8px;
        "></span>
        ${legendMap[color]}
      </div>
    `;
  }

  html += `</div>`;

  div.innerHTML = html;
  return div;
};

legend.addTo(map);
</script>
</body>
</html>
